name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy configuration
        id: check
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          ORACLE_PATH: ${{ secrets.ORACLE_PATH }}
        run: |
          if [ -z "$ORACLE_HOST" ] || [ -z "$ORACLE_USER" ] || [ -z "$ORACLE_SSH_KEY" ] || [ -z "$ORACLE_PATH" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Oracle deploy secrets are not configured yet. Skipping deploy."
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            REPO_URL="https://github.com/cozilic/OBSTicker.git"
            APP_DIR="${{ secrets.ORACLE_PATH }}"

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$(dirname "$APP_DIR")"
              rm -rf "$APP_DIR"
              git clone --branch main "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            APP_DIR="$APP_DIR" bash deploy/deploy.sh
